<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0907"/>
      <stop offset="1" stop-color="#14100B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE28A"/>
      <stop offset="1" stop-color="#FFB200"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7DFFB2"/>
      <stop offset="1" stop-color="#2EDC83"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#82E4FF"/>
      <stop offset="1" stop-color="#32B8FF"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1060" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="#040404"/>
  <circle cx="260" cy="180" r="220" fill="#FFB200" fill-opacity="0.08"/>
  <circle cx="1340" cy="220" r="180" fill="#31E68A" fill-opacity="0.05"/>
  <rect x="40" y="40" width="1520" height="900" rx="36" fill="url(#bg)" stroke="#3A2A12" stroke-width="2" filter="url(#shadow)"/>

  <text x="96" y="128" fill="#FFE7B0" font-family="Segoe UI, Arial, sans-serif" font-size="22" letter-spacing="8">ARQUITETURA DO BOT</text>
  <text x="96" y="190" fill="#F7ECD8" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">Comparativo da Stack</text>
  <text x="96" y="238" fill="#B8A88E" font-family="Segoe UI, Arial, sans-serif" font-size="28">Linguagens, frameworks e bibliotecas utilizadas no sistema do robô.</text>

  <rect x="96" y="300" width="330" height="250" rx="28" fill="#14100C" stroke="#5A431B"/>
  <text x="128" y="354" fill="#FFD470" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">1. Frontend</text>
  <text x="128" y="396" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Linguagens</text>
  <text x="128" y="432" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">HTML, CSS, JavaScript</text>
  <text x="128" y="478" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Bibliotecas</text>
  <text x="128" y="514" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">SVG nativo para gráficos</text>
  <text x="128" y="542" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Sem framework SPA pesado</text>
  <text x="128" y="586" fill="#7DFFB2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Vantagem: leve, rápido e direto</text>

  <rect x="454" y="300" width="330" height="250" rx="28" fill="#14100C" stroke="#5A431B"/>
  <text x="486" y="354" fill="#FFD470" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">2. API e Painel</text>
  <text x="486" y="396" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Runtime</text>
  <text x="486" y="432" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Node.js</text>
  <text x="486" y="478" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Framework</text>
  <text x="486" y="514" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Express</text>
  <text x="486" y="560" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Função</text>
  <text x="486" y="596" fill="#7DFFB2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Serve API, dashboard e rotas modulares</text>

  <rect x="812" y="300" width="330" height="250" rx="28" fill="#14100C" stroke="#5A431B"/>
  <text x="844" y="354" fill="#FFD470" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">3. Core do Trading</text>
  <text x="844" y="396" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Linguagem</text>
  <text x="844" y="432" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">JavaScript (ES Modules)</text>
  <text x="844" y="478" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Bibliotecas</text>
  <text x="844" y="514" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">ws, axios, dotenv</text>
  <text x="844" y="560" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Função</text>
  <text x="844" y="596" fill="#7DFFB2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Estratégia, execução, Telegram e Binance</text>

  <rect x="1170" y="300" width="330" height="250" rx="28" fill="#14100C" stroke="#5A431B"/>
  <text x="1202" y="354" fill="#FFD470" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">4. Dados e Infra</text>
  <text x="1202" y="396" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Banco</text>
  <text x="1202" y="432" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Postgres + pg</text>
  <text x="1202" y="478" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Infra</text>
  <text x="1202" y="514" fill="#CBBCA0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Docker + Docker Compose</text>
  <text x="1202" y="560" fill="#F6E7C9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Função</text>
  <text x="1202" y="596" fill="#7DFFB2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Persistência, deploy e padronização</text>

  <rect x="96" y="604" width="1404" height="262" rx="28" fill="#110E0A" stroke="#4D3916"/>
  <text x="128" y="658" fill="#FFD470" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Comparativo objetivo</text>

  <text x="128" y="716" fill="#82E4FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Linguagens</text>
  <text x="128" y="752" fill="#EEDFC3" font-family="Segoe UI, Arial, sans-serif" font-size="20">HTML/CSS:</text>
  <text x="292" y="752" fill="#C7B697" font-family="Segoe UI, Arial, sans-serif" font-size="20">camada visual da dashboard</text>
  <text x="128" y="786" fill="#EEDFC3" font-family="Segoe UI, Arial, sans-serif" font-size="20">JavaScript:</text>
  <text x="292" y="786" fill="#C7B697" font-family="Segoe UI, Arial, sans-serif" font-size="20">front do painel, API, estratégia, integração Binance e Telegram</text>
  <text x="128" y="820" fill="#EEDFC3" font-family="Segoe UI, Arial, sans-serif" font-size="20">SQL:</text>
  <text x="292" y="820" fill="#C7B697" font-family="Segoe UI, Arial, sans-serif" font-size="20">migrations e estrutura do Postgres</text>

  <text x="840" y="716" fill="#7DFFB2" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Frameworks e bibliotecas</text>
  <text x="840" y="752" fill="#EEDFC3" font-family="Segoe UI, Arial, sans-serif" font-size="20">Express:</text>
  <text x="984" y="752" fill="#C7B697" font-family="Segoe UI, Arial, sans-serif" font-size="20">orquestra a API e o painel</text>
  <text x="840" y="786" fill="#EEDFC3" font-family="Segoe UI, Arial, sans-serif" font-size="20">ws:</text>
  <text x="984" y="786" fill="#C7B697" font-family="Segoe UI, Arial, sans-serif" font-size="20">stream de preço em tempo real</text>
  <text x="840" y="820" fill="#EEDFC3" font-family="Segoe UI, Arial, sans-serif" font-size="20">axios:</text>
  <text x="984" y="820" fill="#C7B697" font-family="Segoe UI, Arial, sans-serif" font-size="20">requisições REST para Binance e Telegram</text>

  <rect x="96" y="890" width="420" height="16" rx="8" fill="#2A2114"/>
  <rect x="96" y="890" width="188" height="16" rx="8" fill="url(#gold)"/>
  <text x="536" y="904" fill="#D1BE97" font-family="Segoe UI, Arial, sans-serif" font-size="18">Frontend e visual</text>

  <rect x="680" y="890" width="420" height="16" rx="8" fill="#1C1E14"/>
  <rect x="680" y="890" width="242" height="16" rx="8" fill="url(#green)"/>
  <text x="1120" y="904" fill="#D1BE97" font-family="Segoe UI, Arial, sans-serif" font-size="18">Core de execução</text>

  <rect x="1180" y="890" width="320" height="16" rx="8" fill="#131B20"/>
  <rect x="1180" y="890" width="174" height="16" rx="8" fill="url(#blue)"/>
  <text x="1368" y="904" fill="#D1BE97" font-family="Segoe UI, Arial, sans-serif" font-size="18">Infra e dados</text>
</svg>
